<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">
                    <div class="mb30 flexarea"style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                        <span>
                            <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                        </span>
                    </div>
                    <div class="form-group">
                        <label style="color:red" for="requiredcontents">*は必須項目です</label>
                    </div>
                    <br>
                     <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        <div class="form-group">
                         <label for="name">書籍名</label>
                         <label style="color:red" for="name">*</label>
                         <br> 
                         <input type="text" name="title" th:field="*{title}" placeholder="書籍名を入力" size="100" maxlength="50" style="width: 100%; font-size: 20px;">     
                         <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red;"></span>
                        </div>
                        <br>
                        <div class="form-group">
                          <label for="name">ISBN</label>
                          <label style="color:red" for="name">*</label>
                          <br>
                          <input type="text" name="isbn" th:field="*{isbn}" placeholder="ISBNを入力"  size="100" maxlength="13" style="width: 100%; font-size: 20px;">  
                          <span th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" style="color:red;"></span>
                        </div>
                        <br>
                        <div class="btn_block" style="text-align: center;">
                            <input type="submit" id="submit_btn" value="保存">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
